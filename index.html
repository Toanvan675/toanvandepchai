<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at center,#15092d 0%,#050814 45%,#000 100%);
    color:white;
    overflow-x:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

header{
    text-align:center;
    padding:80px 20px;
}

.avatar{
    width:160px;
    height:160px;
    border-radius:50%;
    background:linear-gradient(45deg,#00f5ff,#7c3aed);
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    font-weight:bold;
    box-shadow:0 0 30px cyan;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

h1{
    margin-top:20px;
    font-size:3rem;
}

.info{
    margin-top:15px;
    font-size:1.1rem;
    opacity:0.9;
}

.section{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.socials{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

.socials a{
    text-decoration:none;
    color:white;
    padding:12px 25px;
    border-radius:12px;
    background:linear-gradient(45deg,#06b6d4,#7c3aed);
    transition:0.3s;
}

.socials a:hover{
    transform:scale(1.08);
}

.uni-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

.uni-btn{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-size:16px;
    background:linear-gradient(45deg,#2563eb,#7c3aed);
    transition:0.3s;
}

.uni-btn:hover{
    transform:scale(1.05);
}

/* Nút Expand có style riêng biệt một chút cho nổi bật */
#expandBtn {
    margin-bottom: 20px;
    background: linear-gradient(45deg, #10b981, #059669);
}

.result{
    margin-top:25px;
    display:none;
    animation:fade 0.5s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.result ul{
    margin-top:15px;
    padding-left:25px;
}

footer{
    text-align:center;
    padding:40px;
    opacity:0.8;
}
</style>
</head>

const expandBtn = document.getElementById("expandBtn");
const buttonContainer = document.getElementById("buttons");
const resultBox = document.getElementById("resultBox");
const uniName = document.getElementById("uniName");
const majors = document.getElementById("majors");

/* LOGIC CHO NÚT EXPAND */
expandBtn.addEventListener("click", () => {
    // Nếu danh sách đang ẩn, đổi thành flex để hiển thị
    if (buttonContainer.style.display === "none" || buttonContainer.style.display === "") {
        buttonContainer.style.display = "flex";
        expandBtn.innerText = "Thu gọn danh sách trường";
    } else {
        // Nếu đang hiển thị, đổi về none để ẩn đi
        buttonContainer.style.display = "none";
        expandBtn.innerText = "Hiển thị danh sách trường";
        
        // Ẩn luôn bảng chi tiết kết quả nếu nó đang mở
        resultBox.style.display = "none";
    }
});

for(let uni in universities){

    const btn = document.createElement("button");
    btn.className = "uni-btn";
    btn.innerText = uni;

    btn.onclick = () => {

        uniName.innerText = uni;
        majors.innerHTML = "";

        universities[uni].forEach(major => {
            const li = document.createElement("li");
            li.innerText = major;
            majors.appendChild(li);
        });

        resultBox.style.display = "block";
    };

    buttonContainer.appendChild(btn);
}

/*
=========================================
MILKY WAY GALAXY BACKGROUND
=========================================
*/

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let mouseX = 0;
let mouseY = 0;
let scrollProgress = 0;

const stars = [];

for(let i=0;i<2500;i++){

    const angle = Math.random()*Math.PI*8;
    const radius = Math.random()*600;

    stars.push({
        angle,
        radius,
        size:Math.random()*2,
        speed:Math.random()*0.0005,
        brightness:Math.random()
    });
}

window.addEventListener("mousemove",(e)=>{
    mouseX=(e.clientX-innerWidth/2)*0.03;
    mouseY=(e.clientY-innerHeight/2)*0.03;
});

window.addEventListener("scroll",()=>{

    scrollProgress=
    window.scrollY/
    (document.body.scrollHeight-window.innerHeight);

});

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const hue = 220 + scrollProgress*140;

    // nebula
    const g1 = ctx.createRadialGradient(
        canvas.width*0.3,
        canvas.height*0.4,
        0,
        canvas.width*0.3,
        canvas.height*0.4,
        500
    );

    g1.addColorStop(0,`hsla(${hue},100%,70%,0.35)`);
    g1.addColorStop(1,"transparent");

    ctx.fillStyle=g1;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const g2 = ctx.createRadialGradient(
        canvas.width*0.7,
        canvas.height*0.6,
        0,
        canvas.width*0.7,
        canvas.height*0.6,
        450
    );

    g2.addColorStop(0,`hsla(${hue+60},100%,70%,0.25)`);
    g2.addColorStop(1,"transparent");

    ctx.fillStyle=g2;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const cx = canvas.width/2 + mouseX;
    const cy = canvas.height/2 + mouseY;

    stars.forEach(s=>{

        s.angle += s.speed;

        const spiral =
        s.radius * 0.25;

        const x =
        cx +
        Math.cos(s.angle)*s.radius +
        Math.cos(s.angle*2)*spiral;

        const y =
        cy +
        Math.sin(s.angle)*s.radius*0.3;

        const alpha =
        0.3 +
        Math.sin(Date.now()*0.001+s.radius)*0.3;

        ctx.beginPath();
        ctx.arc(x,y,s.size,0,Math.PI*2);

        ctx.fillStyle=
        `rgba(255,255,255,${alpha})`;

        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
});

</script>
